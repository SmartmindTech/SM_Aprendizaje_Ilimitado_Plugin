name: Release Plugin

on:
  push:
    branches: [main, dev, testnuxt]

# Serialize runs per branch. If a new push lands while a run is in progress,
# cancel the older one — only the latest commit ever needs releasing, and
# concurrent runs racing on the same `gh release create v$RELEASE` tag was
# making everything fail.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Vue SPA
        working-directory: frontend
        run: |
          npm ci
          npm run deploy

      - name: Extract plugin metadata
        id: meta
        run: |
          VERSION=$(grep -oP '\$plugin->version\s*=\s*\K[0-9]+' version.php)
          RELEASE=$(grep -oP "\\\$plugin->release\s*=\s*'\K[^']+" version.php)
          REQUIRES=$(grep -oP '\$plugin->requires\s*=\s*\K[0-9]+' version.php)
          MATURITY_STR=$(grep -oP '\$plugin->maturity\s*=\s*\K\w+' version.php)

          case "$MATURITY_STR" in
            MATURITY_ALPHA)  MATURITY=50  ;;
            MATURITY_BETA)   MATURITY=100 ;;
            MATURITY_RC)     MATURITY=150 ;;
            MATURITY_STABLE) MATURITY=200 ;;
            *)               MATURITY=50  ;;
          esac

          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "release=$RELEASE"   >> "$GITHUB_OUTPUT"
          echo "requires=$REQUIRES" >> "$GITHUB_OUTPUT"
          echo "maturity=$MATURITY" >> "$GITHUB_OUTPUT"

      - name: Build plugin ZIP
        run: |
          PLUGIN_DIR="/tmp/build/sm_graphics_plugin"
          mkdir -p "$PLUGIN_DIR"

          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitmodules' \
            --exclude='.gitignore' \
            --exclude='scripts' \
            --exclude='CLAUDE.md' \
            --exclude='frontend' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/.nuxt' \
            --exclude='frontend/.output' \
            ./ "$PLUGIN_DIR/"

          cd /tmp/build
          zip -r /tmp/sm_graphics_plugin.zip sm_graphics_plugin/

      - name: Build update.xml
        run: |
          REPO="${{ github.repository }}"
          VERSION="${{ steps.meta.outputs.version }}"
          RELEASE="${{ steps.meta.outputs.release }}"
          REQUIRES="${{ steps.meta.outputs.requires }}"
          MATURITY="${{ steps.meta.outputs.maturity }}"
          DOWNLOAD="https://github.com/${REPO}/releases/download/v${RELEASE}/sm_graphics_plugin.zip"
          URL="https://github.com/${REPO}/releases/tag/v${RELEASE}"

          cat > update.xml << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <updates>
              <update>
                  <component>local_sm_graphics_plugin</component>
                  <version>${VERSION}</version>
                  <release>${RELEASE}</release>
                  <requires>${REQUIRES}</requires>
                  <maturity>${MATURITY}</maturity>
                  <download>${DOWNLOAD}</download>
                  <url>${URL}</url>
              </update>
          </updates>
          EOF

      - name: Delete previous release with same tag
        run: gh release delete "v${{ steps.meta.outputs.release }}" --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        run: |
          gh release create "v${{ steps.meta.outputs.release }}" \
            /tmp/sm_graphics_plugin.zip \
            update.xml \
            --title "v${{ steps.meta.outputs.release }}" \
            --notes "Plugin version: ${{ steps.meta.outputs.version }}" \
            --target "${{ github.sha }}" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit update.xml to branch (backwards-compat)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore: update update.xml for v${{ steps.meta.outputs.release }} [skip ci]"
            git push
          fi
